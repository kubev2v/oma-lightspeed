name: Eval Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "Eval tags to run (space-separated, or 'all')"
        default: "smoke"

jobs:
  eval-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install eval framework
        run: pip install git+https://github.com/lightspeed-core/lightspeed-evaluation.git#subdirectory=lsc_agent_eval pyyaml

      - name: Write Vertex AI credentials
        env:
          VERTEX_SA_JSON: ${{ secrets.VERTEX_SA_JSON }}
        run: |
          echo "$VERTEX_SA_JSON" > /tmp/vertex-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/vertex-sa.json" >> "$GITHUB_ENV"

      - name: Start OMA Lightspeed
        env:
          GEMINI_API_KEY: dummy
        run: |
          make generate <<< "$GEMINI_API_KEY"
          make run &
          # Wait for service to be ready
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/liveness > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run smoke evals
        run: >
          cd test/evals && python eval.py
          --tags smoke
          --judge_provider vertex
          --judge_model gemini-2.5-flash

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: test/evals/eval_output/
