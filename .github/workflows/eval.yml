name: Eval Tests

on:
  # pull_request_target runs in the base repo context (has access to secrets)
  # while still being triggered by PR events from forks
  pull_request_target:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "Eval tags to run (space-separated, or 'all')"
        default: "smoke"

env:
  LIGHTSPEED_STACK_IMAGE: quay.io/lightspeed-core/lightspeed-stack:0.5.1

jobs:
  eval-smoke:
    name: eval-smoke
    runs-on: ubuntu-latest
    steps:
      # Checkout base branch (trusted code for workflow, configs, eval framework)
      - uses: actions/checkout@v4

      # Checkout PR's eval test data (safe — YAML data, not executable)
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request_target'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          sparse-checkout: test/evals/eval_data.yaml
          sparse-checkout-cone-mode: false

      - name: Use PR eval data if changed
        if: github.event_name == 'pull_request_target'
        run: |
          if [ -f pr/test/evals/eval_data.yaml ]; then
            cp pr/test/evals/eval_data.yaml test/evals/eval_data.yaml
            echo "Using eval_data.yaml from PR"
          fi
          rm -rf pr

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install git+https://github.com/lightspeed-core/lightspeed-evaluation.git#subdirectory=lsc_agent_eval pyyaml fastapi uvicorn
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Write Vertex AI credentials
        env:
          VERTEX_SA_JSON: ${{ secrets.VERTEX_SA_JSON }}
        run: |
          mkdir -p config
          python3 -c "
          import os, json
          raw = os.environ['VERTEX_SA_JSON'].strip()
          if not raw:
              print('ERROR: VERTEX_SA_JSON secret is not set')
              exit(1)
          data = json.loads(raw)
          with open('config/vertex-credentials.json', 'w') as f:
              json.dump(data, f)
          print(f'Vertex AI SA written (project: {data.get(\"project_id\", \"unknown\")})')
          "
          chmod 644 config/vertex-credentials.json

      - name: Generate config
        run: |
          VERTEX_PROJECT=$(python3 -c "import json; print(json.load(open('config/vertex-credentials.json')).get('project_id',''))")
          echo "Vertex AI project: ${VERTEX_PROJECT}"
          printf 'GEMINI_API_KEY=dummy\nVERTEXAI_PROJECT=%s\nVERTEXAI_LOCATION=us-central1\n' "$VERTEX_PROJECT" > .env
          chmod 600 .env
          make generate
          yq -i '
            (.providers.inference[0].provider_type) = "remote::vertexai" |
            (.providers.inference[0].config) = {"project": "${env.VERTEX_AI_PROJECT}", "location": "${env.VERTEX_AI_LOCATION}"} |
            (.registered_resources.models[0].model_id) = "google/gemini-2.5-flash" |
            (.registered_resources.models[0].provider_model_id) = "google/gemini-2.5-flash"
          ' config/llama_stack_client_config.yaml
          sed -i 's|default_model:.*|default_model: google/gemini-2.5-flash|' config/lightspeed-stack.yaml

      - name: Start MCP stub
        run: |
          cat > /tmp/mcp_stub.py << 'PYEOF'
          from fastapi import FastAPI, Request
          from starlette.responses import JSONResponse
          import uvicorn
          app = FastAPI()
          @app.api_route("/mcp", methods=["GET", "POST"])
          async def mcp(request: Request):
              return JSONResponse({"jsonrpc": "2.0", "result": {"tools": []}})
          @app.get("/health")
          async def health():
              return {"status": "ok"}
          if __name__ == "__main__":
              uvicorn.run(app, host="0.0.0.0", port=8000, log_level="warning")
          PYEOF
          nohup python3 /tmp/mcp_stub.py > /tmp/mcp_stub.log 2>&1 &
          sleep 2
          curl -sf http://localhost:8000/health || { echo "MCP stub failed"; cat /tmp/mcp_stub.log; exit 1; }

      - name: Start OMA Lightspeed
        run: |
          VERTEX_PROJECT=$(grep VERTEXAI_PROJECT .env | cut -d= -f2)
          sed -i 's|http://localhost:8000/mcp|http://host.containers.internal:8000/mcp|g' config/lightspeed-stack.yaml config/llama_stack_client_config.yaml
          mkdir -p /tmp/oma-data
          podman run -d --name oma-lightspeed \
            -p 8080:8080 \
            -v $(pwd)/config/lightspeed-stack.yaml:/app-root/lightspeed-stack.yaml:ro \
            -v $(pwd)/config/llama_stack_client_config.yaml:/app-root/llama_stack_client_config.yaml:ro \
            -v $(pwd)/config/systemprompt.txt:/tmp/systemprompt.txt:ro \
            -v $(pwd)/config/sitecustomize.py:/app-root/.venv/lib/python3.12/site-packages/sitecustomize.py:ro \
            -v $(pwd)/config/vertex-credentials.json:/app-root/google-vertex-service-account.json:ro \
            -v /tmp/oma-data:/data \
            -e GEMINI_API_KEY=dummy \
            -e GOOGLE_API_KEY=dummy \
            -e GOOGLE_APPLICATION_CREDENTIALS=/app-root/google-vertex-service-account.json \
            -e VERTEX_AI_PROJECT=$VERTEX_PROJECT \
            -e VERTEX_AI_LOCATION=us-central1 \
            -e SQLITE_STORE_DIR=/data \
            -e LLAMA_STACK_SQLITE_STORE_DIR=/data \
            $LIGHTSPEED_STACK_IMAGE
          echo "Waiting for OMA Lightspeed..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/liveness > /dev/null 2>&1; then
              echo "Service ready after $((i*2))s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/liveness || { echo "Service failed to start"; podman logs oma-lightspeed 2>&1 | tail -50; exit 1; }

      - name: Run smoke evals
        env:
          GOOGLE_APPLICATION_CREDENTIALS: config/vertex-credentials.json
        run: >
          cd test/evals && python eval.py
          --tags ${{ inputs.tags || 'smoke' }}
          --agent_endpoint http://localhost:8080
          --judge_provider vertex
          --judge_model gemini-2.5-flash

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: test/evals/eval_output/

      - name: Show logs on failure
        if: failure()
        run: podman logs oma-lightspeed 2>&1 | tail -100
