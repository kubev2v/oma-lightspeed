# Secret template for OMA Lightspeed
# Used with: podman play kube (or kubectl apply)
#
# For local development, scripts/run.sh creates this secret automatically
# from your .env file. You do not need to manually create it.
#
# For production, create the secret via:
#   kubectl create secret generic oma-lightspeed-secret \
#     --from-literal=gemini-api-key=<your-key>

apiVersion: v1
kind: Secret
metadata:
  name: oma-lightspeed-secret
type: Opaque
stringData:
  gemini-api-key: ${GEMINI_API_KEY}
