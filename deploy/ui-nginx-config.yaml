apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-planner-ui-nginx
  labels:
    app: migration-planner-ui
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        client_max_body_size 50M;

        upstream migration_planner_api {
            server migration-planner-api:3443;
        }

        upstream oma_lightspeed {
            server oma-lightspeed:8080;
        }

        server {
            listen 8080;
            server_name localhost;
            root /usr/share/nginx/html;
            index index.html;

            # Chat API -> oma-lightspeed (streaming support)
            location /api/chat/ {
                proxy_pass http://oma_lightspeed/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Connection '';
                proxy_connect_timeout 300s;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
                proxy_buffering off;
                proxy_cache off;
                chunked_transfer_encoding on;
            }

            # Migration Planner API
            location /api/migration-assessment/ {
                proxy_pass http://migration_planner_api/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 300s;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
            }

            # Fallback for other /api/ routes
            location /api/ {
                proxy_pass http://migration_planner_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 300s;
                proxy_send_timeout 300s;
                proxy_read_timeout 300s;
            }

            location / {
                try_files $uri $uri/ /index.html;
            }

            gzip on;
            gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;

            access_log /dev/stdout;
            error_log /dev/stderr;
        }
    }
