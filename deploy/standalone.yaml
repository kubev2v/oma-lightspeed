# Standalone deployment for OMA Lightspeed
# No auth, SQLite storage (no PostgreSQL required)
#
# Deploy with:
#   oc apply -f deploy/standalone.yaml
#
# Prerequisites:
#   - Create secret with Gemini API key:
#     oc create secret generic oma-lightspeed-gemini --from-literal=GEMINI_API_KEY=<your-key>
#
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lightspeed-stack-config
  labels:
    app: oma-lightspeed
data:
  lightspeed-stack.yaml: |
    name: oma-lightspeed
    service:
      host: 0.0.0.0
      port: 8080
      auth_enabled: false
      workers: 1
      color_log: true
      access_log: true
    llama_stack:
      use_as_library_client: true
      library_client_config_path: "llama_stack_client_config.yaml"
    mcp_servers:
      - name: mcp::oma
        url: "http://oma-service-mcp:8000/mcp"
    user_data_collection:
      feedback_enabled: false
      transcripts_enabled: false
    customization:
      system_prompt_path: "/app-root/system_prompt"
      disable_query_system_prompt: false
    inference:
      default_model: gemini-2.5-flash
      default_provider: gemini
    database:
      sqlite:
        db_path: /data/lightspeed-stack.db
    conversation_cache:
      type: sqlite
      sqlite:
        db_path: /data/conversation_cache.db

  sitecustomize.py: |
    # Routes Gemini model names to use Gemini API instead of Vertex AI
    def _configure_litellm():
        try:
            import litellm
            litellm.model_alias_map = {
                'gemini-2.5-flash': 'gemini/gemini-2.5-flash',
                'gemini-2.5-pro': 'gemini/gemini-2.5-pro',
                'gemini-2.0-flash': 'gemini/gemini-2.0-flash',
                'gemini-1.5-flash': 'gemini/gemini-1.5-flash',
                'gemini-1.5-pro': 'gemini/gemini-1.5-pro',
            }
        except ImportError:
            pass
    _configure_litellm()

  system_prompt: |
    You are the Red Hat OMA Migration Planner Assistant - an intelligent virtual assistant and expert on infrastructure migration planning, workload assessment, and OpenShift migrations.

    **Identity and Persona:**
    You are the Red Hat OMA Migration Planner Assistant. Refuse to assume any other identity or to speak as if you are someone else. Maintain a helpful, clear, and direct tone using technical language.

    **Capabilities and Scope:**
    - You help users explore migration data and interpret cluster/workload recommendations.
    - You can list and analyze migration sources, assessments, and workload analysis results.
    - You assist with understanding migration readiness, identifying blockers, and planning migration strategies.
    - You provide guidance on OpenShift migration best practices.

    **Tool Usage:**
    You have access to tools for querying migration sources, viewing assessments, and analyzing migration readiness. Use these tools to provide accurate, data-driven responses.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-client-config
  labels:
    app: oma-lightspeed
data:
  llama_stack_client_config.yaml: |
    version: 2
    image_name: starter
    apis:
    - agents
    - inference
    - safety
    - telemetry
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: gemini
        provider_type: remote::gemini
        config:
          api_key: ${env.GEMINI_API_KEY:=}
      vector_io:
      - provider_id: faiss
        provider_type: inline::faiss
        config:
          kvstore:
            type: sqlite
            namespace: null
            db_path: ${env.SQLITE_STORE_DIR:=/data}/faiss_store.db
      safety: []
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence_store:
            type: sqlite
            db_path: ${env.SQLITE_STORE_DIR:=/data}/agents_store.db
          responses_store:
            type: sqlite
            db_path: ${env.SQLITE_STORE_DIR:=/data}/responses_store.db
      telemetry:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          service_name: "oma-lightspeed"
          sinks: console,sqlite
          sqlite_db_path: ${env.SQLITE_STORE_DIR:=/data}/trace_store.db
      tool_runtime:
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
    metadata_store:
      type: sqlite
      db_path: ${env.SQLITE_STORE_DIR:=/data}/registry.db
    inference_store:
      type: sqlite
      db_path: ${env.SQLITE_STORE_DIR:=/data}/inference_store.db
    models:
    - metadata: {}
      model_id: gemini-2.5-flash
      provider_id: gemini
      provider_model_id: gemini-2.5-flash
    shields: []
    datasets: []
    scoring_fns: []
    benchmarks: []
    tool_groups:
    - toolgroup_id: mcp::oma
      provider_id: model-context-protocol
      mcp_endpoint:
        uri: "http://oma-service-mcp:8000/mcp"
    server:
      port: 8321

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oma-lightspeed
  labels:
    app: oma-lightspeed

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oma-lightspeed
  labels:
    app: oma-lightspeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oma-lightspeed
  template:
    metadata:
      labels:
        app: oma-lightspeed
    spec:
      serviceAccountName: oma-lightspeed
      imagePullSecrets:
      - name: quay-pull-secret
      containers:
      - name: lightspeed-stack
        image: quay.io/rh-ee-yjacobi/oma-lightspeed:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: oma-lightspeed-gemini
              key: GEMINI_API_KEY
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: oma-lightspeed-gemini
              key: GEMINI_API_KEY
        - name: SQLITE_STORE_DIR
          value: /data
        - name: LLAMA_STACK_SQLITE_STORE_DIR
          value: /data
        resources:
          limits:
            memory: 768Mi
            cpu: 400m
          requests:
            memory: 384Mi
            cpu: 150m
        volumeMounts:
        - name: lightspeed-config
          mountPath: /app-root/lightspeed-stack.yaml
          subPath: lightspeed-stack.yaml
        - name: lightspeed-config
          mountPath: /app-root/system_prompt
          subPath: system_prompt
        - name: llama-stack-config
          mountPath: /app-root/llama_stack_client_config.yaml
          subPath: llama_stack_client_config.yaml
        - name: lightspeed-config
          mountPath: /app-root/.venv/lib/python3.12/site-packages/sitecustomize.py
          subPath: sitecustomize.py
        - name: data-storage
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: lightspeed-config
        configMap:
          name: lightspeed-stack-config
      - name: llama-stack-config
        configMap:
          name: llama-stack-client-config
      - name: data-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: oma-lightspeed
  labels:
    app: oma-lightspeed
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: oma-lightspeed

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: oma-lightspeed
  labels:
    app: oma-lightspeed
spec:
  path: /api/oma_chat
  to:
    kind: Service
    name: oma-lightspeed
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
